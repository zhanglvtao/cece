name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build all platforms
        run: |
          for GOOS in darwin linux; do
            for GOARCH in arm64 amd64; do
              export GOOS GOARCH
              if [ "$GOARCH" = "amd64" ]; then
                SUFFIX="cece-${GOOS}-x64"
              else
                SUFFIX="cece-${GOOS}-${GOARCH}"
              fi
              echo "Building $SUFFIX..."
              go build -ldflags="-s -w -X cece/internal/version.Version=${GITHUB_REF_NAME#v}" -o "$SUFFIX" ./cmd/cece
              tar czf "${SUFFIX}.tar.gz" "$SUFFIX"
            done
          done
          shasum -a 256 *.tar.gz > checksums.txt
          echo "Artifacts:"
          ls -lh *.tar.gz checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            checksums.txt
